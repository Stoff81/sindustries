global:
  scrape_interval: 15s

scrape_configs:
  - job_name: otel-collector
    static_configs:
      - targets: ["otel-collector:8889"]
  - job_name: otel-collector-internal
    static_configs:
      - targets: ["otel-collector:8888"]
  - job_name: plano
    honor_timestamps: true
    scrape_interval: 15s
    scrape_timeout: 10s
    metrics_path: /stats/prometheus
    scheme: http
    static_configs:
      - targets:
          # Plano Envoy admin on the host; 127.0.0.1 is wrong from inside the Prometheus container.
          - host.docker.internal:9901
        labels:
          environment: dev
scrape_config_files:
  - ../plano/prometheus/scrape_plano.yml