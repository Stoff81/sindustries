# Plano sidecar collector: receives OTLP from the Plano gateway and forwards
# traces to the sindustries dev collector (localhost:4317) for spanmetrics
# derivation and storage in Tempo.

receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch:

exporters:
  otlp/dev:
    endpoint: localhost:4317
    tls:
      insecure: true

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [batch]
      exporters: [otlp/dev]
