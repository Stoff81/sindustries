services:
  postgres:
    image: postgres:16-alpine
    container_name: sindustries-postgres-dev
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: sindustries
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - sindustries-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d sindustries"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s

volumes:
  sindustries-postgres-data:
