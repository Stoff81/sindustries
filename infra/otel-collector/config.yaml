receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

# Derive Prometheus RED-style metrics from traces (used by Grafana dashboard plano-requests-overview).
connectors:
  spanmetrics:
    dimensions:
      - name: llm.model
      - name: agent_id
      - name: selection.listener
      - name: http.method
      - name: http.status_code
      # Stable HTTP semconv (OTel 1.23+); Plano/filter spans often only set this, not legacy http.status_code.
      - name: http.response.status_code
    # Record span duration in seconds (OTel semconv). Without wide enough buckets, LLM spans
    # all land in +Inf and histogram_quantile clamps to the last finite le (~10ms).
    histogram:
      unit: s
      explicit:
        buckets:
          - 10ms
          - 50ms
          - 100ms
          - 250ms
          - 500ms
          - 1s
          - 2s
          - 5s
          - 10s
          - 30s
          - 60s
          - 120s
          - 300s
          - 600s
          - 1800s

processors:
  batch:
    timeout: 5s
    send_batch_size: 1024

exporters:
  otlp/tempo:
    endpoint: tempo:4317
    tls:
      insecure: true
  prometheus:
    endpoint: 0.0.0.0:8889
    const_labels:
      source: otel-collector
    resource_to_telemetry_conversion:
      enabled: true

service:
  telemetry:
    metrics:
      address: 0.0.0.0:8888
  pipelines:
    traces:
      receivers: [otlp]
      processors: [batch]
      exporters: [otlp/tempo, spanmetrics]
    metrics:
      receivers: [otlp]
      processors: [batch]
      exporters: [prometheus]
    metrics/spanmetrics:
      receivers: [spanmetrics]
      exporters: [prometheus]
