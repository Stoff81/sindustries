name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  tasks-api-tests:
    name: tasks-api tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/tasks-api
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: services/tasks-api/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/sindustries_tasks?schema=tasks_api
        run: npm test

  tasks-app-tests:
    name: tasks app tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/tasks
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/tasks/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run unit/component tests
        run: npm test

  tasks-app-e2e:
    name: tasks app e2e
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/tasks
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/tasks/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser + system deps
        run: npx playwright install --with-deps chromium

      - name: Run Playwright e2e
        run: npm run test:e2e
