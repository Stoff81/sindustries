name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  tasks-api-tests:
    name: tasks-api tests (unit + db integration)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/tasks-api
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: sindustries_tasks
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d sindustries_tasks"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/sindustries_tasks?schema=tasks_api
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: services/tasks-api/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm test

      - name: Apply DB migrations
        run: npm run prisma:migrate

      - name: Seed DB
        run: npm run prisma:seed

      - name: Run DB integration tests
        run: npm run test:integration

  tasks-app-tests:
    name: tasks app tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/tasks
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/tasks/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run unit/component tests
        run: npm test

  tasks-app-e2e:
    name: tasks app e2e (ui + api + db)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: sindustries_tasks
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d sindustries_tasks"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js (tasks-api)
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: services/tasks-api/package-lock.json

      - name: Install tasks-api dependencies
        run: npm ci
        working-directory: services/tasks-api

      - name: Setup Node.js (tasks-app)
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/tasks/package-lock.json

      - name: Install tasks-app dependencies
        run: npm ci
        working-directory: apps/tasks

      - name: Apply DB migrations + seed
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/sindustries_tasks?schema=tasks_api
        run: |
          npm run prisma:migrate
          npm run prisma:seed
        working-directory: services/tasks-api

      - name: Start tasks-api
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/sindustries_tasks?schema=tasks_api
          PORT: 4000
          CORS_ALLOWED_ORIGINS: http://127.0.0.1:4173
          ALLOW_PORT_DB_MISMATCH: "1"
        run: npm run start > /tmp/tasks-api.log 2>&1 &
        working-directory: services/tasks-api

      - name: Wait for tasks-api
        run: |
          for i in {1..30}; do
            curl -sf http://127.0.0.1:4000/health && exit 0
            sleep 2
          done
          echo "tasks-api failed to start"
          cat /tmp/tasks-api.log
          exit 1

      - name: Install Playwright browser + system deps
        run: npx playwright install --with-deps chromium
        working-directory: apps/tasks

      - name: Run Playwright e2e
        env:
          CI: true
        run: npm run test:e2e
        working-directory: apps/tasks

      - name: Dump tasks-api logs on failure
        if: failure()
        run: cat /tmp/tasks-api.log
