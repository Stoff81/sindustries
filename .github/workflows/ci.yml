name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  otel-node-tests:
    name: otel-node unit tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install workspace dependencies
        run: npm ci

      - name: Run otel-node tests
        run: npm test --workspace @sindustries/otel-node

  tasks-api-tests:
    name: tasks-api tests (unit + db integration)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: sindustries_tasks
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d sindustries_tasks"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/sindustries_tasks?schema=tasks_api
      OTEL_SDK_DISABLED: '1'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install workspace dependencies
        run: npm ci

      - name: Ensure Rollup Linux native binary is present
        run: npm install --no-save @rollup/rollup-linux-x64-gnu@4.59.0 --workspace services/tasks-api

      - name: Run unit tests
        run: npm test --workspace services/tasks-api

      - name: Apply DB migrations
        run: npm run prisma:migrate --workspace services/tasks-api

      - name: Seed DB
        run: npm run prisma:seed --workspace services/tasks-api

      - name: Run DB integration tests
        run: npm run test:integration --workspace services/tasks-api

  tasks-app-tests:
    name: tasks app tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install workspace dependencies
        run: npm ci

      - name: Ensure Rollup Linux native binary is present
        run: npm install --no-save @rollup/rollup-linux-x64-gnu@4.59.0 --workspace apps/tasks

      - name: Run unit/component tests
        run: npm test --workspace apps/tasks

  tasks-app-e2e:
    name: tasks app e2e (ui + api + db)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: sindustries_tasks
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d sindustries_tasks"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install workspace dependencies
        run: npm ci

      - name: Ensure Rollup Linux native binary is present
        run: |
          npm install --no-save @rollup/rollup-linux-x64-gnu@4.59.0 --workspace apps/tasks
          npm install --no-save @rollup/rollup-linux-x64-gnu@4.59.0 --workspace services/tasks-api

      - name: Apply DB migrations + seed
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/sindustries_tasks?schema=tasks_api
        run: |
          npm run prisma:migrate --workspace services/tasks-api
          npm run prisma:seed --workspace services/tasks-api

      - name: Start tasks-api
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/sindustries_tasks?schema=tasks_api
          PORT: 4000
          CORS_ALLOWED_ORIGINS: http://127.0.0.1:4173
          ALLOW_PORT_DB_MISMATCH: "1"
          OTEL_SDK_DISABLED: "1"
        run: npm run start --workspace services/tasks-api > /tmp/tasks-api.log 2>&1 &

      - name: Wait for tasks-api
        run: |
          for i in {1..30}; do
            curl -sf http://127.0.0.1:4000/health && exit 0
            sleep 2
          done
          echo "tasks-api failed to start"
          cat /tmp/tasks-api.log
          exit 1

      - name: Install Playwright browser + system deps
        run: npm exec --workspace apps/tasks playwright install --with-deps chromium

      - name: Run Playwright e2e
        env:
          CI: true
        run: npm run test:e2e --workspace apps/tasks

      - name: Dump tasks-api logs on failure
        if: failure()
        run: cat /tmp/tasks-api.log

  website-app-tests:
    name: website app tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install workspace dependencies
        run: npm ci

      - name: Ensure Rollup Linux native binary is present
        run: npm install --no-save @rollup/rollup-linux-x64-gnu@4.59.0 --workspace apps/website

      - name: Run unit tests
        run: npm test --workspace apps/website

      - name: Build website
        run: npm run build --workspace apps/website
